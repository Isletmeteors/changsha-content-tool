        };

        const poiTemplates = {
            米粉: ["{name}米粉铺", "{name}粉馆", "{name}正宗米粉", "{name}老字号米粉"],
            茶饮: ["{name}茶铺", "{name}茶饮", "{name}奶茶店", "{name}茶空间"],
            小吃: ["{name}小吃店", "{name}特色小吃", "{name}老字号小吃", "{name}地道小吃"],
            正餐: ["{name}湘菜馆", "{name}家菜馆", "{name}私房菜", "{name}地道湘菜"],
            夜宵: ["{name}夜宵城", "{name}烧烤店", "{name}龙虾馆", "{name}深夜食堂"]
        };

        function generateCopy() {
            const category = document.getElementById('category').value;
            const feature = document.getElementById('feature').value || '味道正宗';
            const style = document.getElementById('style').value;
            const outputSection = document.getElementById('outputSection');
            const resultContainer = document.getElementById('resultContainer');

            const styleTemplates = templates[category][style];
            const categoryTags = tags[category];
            const poiOptions = poiTemplates[category];

            resultContainer.innerHTML = '';

            for (let i = 0; i < 3; i++) {
                const template = styleTemplates[i];
                const content = template.replace('{feature}', feature);
                
                const shuffledTags = [...categoryTags].sort(() => Math.random() - 0.5);
                const selectedTags = shuffledTags.slice(0, 5);
                
                const poiName = poiOptions[Math.floor(Math.random() * poiOptions.length)];
                
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <h3>文案 ${i + 1} <button class="copy-btn" onclick="copyContent(this)">复制</button></h3>
                    <div class="content">${content}</div>
                    <div class="tags">
                        ${selectedTags.map(tag => `<span>${tag}</span>`).join('')}
                    </div>
                    <div class="poi">
                        <span>📍 POI命名建议：</span>
                        <p>${poiName.replace('{name}', '长沙')}</p>
                    </div>
                `;
                resultContainer.appendChild(card);
            }

            outputSection.style.display = 'block';
            outputSection.scrollIntoView({ behavior: 'smooth' });
        }

        function copyContent(btn) {
            const card = btn.closest('.result-card');
            const content = card.querySelector('.content').innerText;
            const tags = card.querySelectorAll('.tags span');
            const poi = card.querySelector('.poi p').innerText;
            
            const fullText = content + '\n\n' + Array.from(tags).map(t => t.innerText).join(' ') + '\n\n' + poi;
            
            navigator.clipboard.writeText(fullText).then(() => {
                btn.innerText = '已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerText = '复制';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
